```html
{% extends "admin/layout.html" %}

{% block title %}
Add Product
{% endblock %}

{% block content %}

<div class="container-fluid">

    <div class="row justify-content-center">

        <div class="col-lg-8">

            <div class="card shadow">

                <div class="card-header bg-success text-white">

                    <h3 class="mb-0">
                        Add New Product
                    </h3>

                </div>

                <div class="card-body">

                    <form method="POST"
                          action="{{ url_for('add_product') }}"
                          enctype="multipart/form-data">

                        <div class="mb-3">

                            <label class="form-label">
                                Product Name
                            </label>

                            <input
                                type="text"
                                name="name"
                                class="form-control"
                                placeholder="Enter product name"
                                required>

                        </div>

                        <div class="mb-3">

                            <label class="form-label">
                                Description
                            </label>

                            <textarea
                                name="description"
                                rows="5"
                                class="form-control"
                                placeholder="Enter product description"
                                required></textarea>

                        </div>

                        <div class="row">

                            <div class="col-md-6">

                                <div class="mb-3">

                                    <label class="form-label">
                                        Price (₹)
                                    </label>

                                    <input
                                        type="number"
                                        step="0.01"
                                        name="price"
                                        class="form-control"
                                        required>

                                </div>

                            </div>

                            <div class="col-md-6">

                                <div class="mb-3">

                                    <label class="form-label">
                                        Stock
                                    </label>

                                    <input
                                        type="number"
                                        name="stock"
                                        class="form-control"
                                        required>

                                </div>

                            </div>

                        </div>

                        <div class="mb-3">

                            <label class="form-label">
                                Category
                            </label>

                            <select
                                name="category_id"
                                class="form-select"
                                required>

                                <option value="">
                                    Select Category
                                </option>

                                {% for category in categories %}

                                <option value="{{ category.id }}">

                                    {{ category.name }}

                                </option>

                                {% endfor %}

                            </select>

                        </div>

                        <div class="mb-4">

                            <label class="form-label">
                                Product Image
                            </label>

                            <input
                                type="file"
                                name="image"
                                class="form-control"
                                accept=".jpg,.jpeg,.png,.gif,.webp"
                                required>

                        </div>

                        <div class="d-flex justify-content-between">

                            <a
                                href="{{ url_for('admin_products') }}"
                                class="btn btn-secondary">

                                Back

                            </a>

                            <button
                                type="submit"
                                class="btn btn-success">

                                Add Product

                            </button>

                        </div>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
```
