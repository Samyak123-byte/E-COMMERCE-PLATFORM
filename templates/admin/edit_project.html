```html
{% extends "admin/layout.html" %}

{% block title %}
Edit Product
{% endblock %}

{% block content %}

<div class="container-fluid">

    <div class="row justify-content-center">

        <div class="col-lg-8">

            <div class="card shadow">

                <div class="card-header bg-warning">

                    <h3>Edit Product</h3>

                </div>

                <div class="card-body">

                    <form method="POST"
                          action="{{ url_for('edit_product', product_id=product.id) }}"
                          enctype="multipart/form-data">

                        <div class="mb-3">

                            <label class="form-label">
                                Product Name
                            </label>

                            <input
                                type="text"
                                name="name"
                                class="form-control"
                                value="{{ product.name }}"
                                required>

                        </div>

                        <div class="mb-3">

                            <label class="form-label">
                                Description
                            </label>

                            <textarea
                                name="description"
                                rows="5"
                                class="form-control"
                                required>{{ product.description }}</textarea>

                        </div>

                        <div class="row">

                            <div class="col-md-6">

                                <div class="mb-3">

                                    <label class="form-label">
                                        Price
                                    </label>

                                    <input
                                        type="number"
                                        step="0.01"
                                        name="price"
                                        class="form-control"
                                        value="{{ product.price }}"
                                        required>

                                </div>

                            </div>

                            <div class="col-md-6">

                                <div class="mb-3">

                                    <label class="form-label">
                                        Stock
                                    </label>

                                    <input
                                        type="number"
                                        name="stock"
                                        class="form-control"
                                        value="{{ product.stock }}"
                                        required>

                                </div>

                            </div>

                        </div>

                        <div class="mb-3">

                            <label class="form-label">
                                Category
                            </label>

                            <select
                                name="category_id"
                                class="form-select"
                                required>

                                {% for category in categories %}

                                <option
                                    value="{{ category.id }}"
                                    {% if category.id == product.category_id %}
                                        selected
                                    {% endif %}>

                                    {{ category.name }}

                                </option>

                                {% endfor %}

                            </select>

                        </div>

                        <div class="mb-3">

                            <label class="form-label">
                                Current Image
                            </label>

                            <br>

                            <img
                                src="{{ url_for('static', filename='images/products/' + product.image) }}"
                                width="180"
                                class="img-thumbnail">

                        </div>

                        <div class="mb-4">

                            <label class="form-label">
                                Upload New Image
                            </label>

                            <input
                                type="file"
                                name="image"
                                class="form-control">

                        </div>

                        <div class="d-flex justify-content-between">

                            <a
                                href="{{ url_for('admin_products') }}"
                                class="btn btn-secondary">

                                Back

                            </a>

                            <button
                                type="submit"
                                class="btn btn-warning">

                                Update Product

                            </button>

                        </div>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
```
